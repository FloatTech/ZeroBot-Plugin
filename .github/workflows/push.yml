name: PushLint
on:
  push:
    branches:
      - master
    tags:
      - 'v*'
jobs:
  golangci:
    uses: ./.github/workflows/libs/lint.yml
    with:
      ref: master
      commit_back: true

  runmain:
    needs: golangci
    if: ${{ !contains(github.event.pull_request.title, '.go') }}
    uses: ./.github/workflows/libs/run.yml
    with:
      ref: master
