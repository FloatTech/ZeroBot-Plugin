name: Run Library
on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      go-version:
        required: false
        type: string
        default: '^1.26'
      fetch-depth:
        required: false
        type: number
        default: 0
      submodules:
        required: false
        type: string
        default: 'recursive'
jobs:
  real_run:
    name: Run on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: true
    steps:
      - name: Set up Go
        uses: actions/setup-go@master
        with:
          go-version: "${{ inputs.go-version }}"

      - name: Check out code into the Go module directory
        uses: actions/checkout@master
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: ${{ inputs.fetch-depth }}
          submodules: ${{ inputs.submodules }}

      - name: Prepare and Build
        shell: bash
        run: |
          go generate main.go
          go mod tidy
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            go build -o testbin.exe .
          else
            go build -o testbin .
          fi

      - name: Run the Program (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./testbin > output.log 2>&1 &
          PID=$!
          FOUND=false
          for i in $(seq 1 600); do
            if grep -q '\[ws\] 连接到Websocket服务器' output.log 2>/dev/null; then
              FOUND=true
              break
            fi
            sleep 1
          done
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
          echo ""
          echo "Run log:"
          cat output.log
          echo ""
          if [ "$FOUND" = true ]; then
            echo "Success: Found target output"
            exit 0
          else
            echo "Failure: Timeout after 600s without finding target output"
            exit 1
          fi

      - name: Run the Program (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $logFile = Join-Path $PWD "output.log"
          $env:DEBUG_MODE = "1"
          $proc = Start-Process -FilePath ".\testbin.exe" -NoNewWindow -PassThru -RedirectStandardOutput "$logFile" -RedirectStandardError (Join-Path $PWD "stderr.log")
          $found = $false
          for ($i = 0; $i -lt 600; $i++) {
            Start-Sleep -Seconds 1
            try {
              $content = ""
              foreach ($f in @($logFile, (Join-Path $PWD "stderr.log"))) {
                if (Test-Path $f) {
                  $fs = [System.IO.FileStream]::new($f, [System.IO.FileMode]::Open, [System.IO.FileAccess]::Read, [System.IO.FileShare]::ReadWrite)
                  $sr = [System.IO.StreamReader]::new($fs)
                  $content += $sr.ReadToEnd()
                  $sr.Close()
                  $fs.Close()
                }
              }
              if ($content -match '\[ws\] 连接到Websocket服务器') {
                $found = $true
                break
              }
            } catch {}
          }
          try { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue } catch {}
          try { taskkill /F /T /PID $proc.Id 2>$null } catch {}
          Write-Host ""
          Write-Host "Run log:"
          foreach ($f in @($logFile, (Join-Path $PWD "stderr.log"))) {
            if (Test-Path $f) {
              try {
                $fs = [System.IO.FileStream]::new($f, [System.IO.FileMode]::Open, [System.IO.FileAccess]::Read, [System.IO.FileShare]::ReadWrite)
                $sr = [System.IO.StreamReader]::new($fs)
                Write-Host $sr.ReadToEnd()
                $sr.Close()
                $fs.Close()
              } catch {}
            }
          }
          Write-Host ""
          if ($found) {
            Write-Host "Success: Found target output"
            exit 0
          } else {
            Write-Host "Failure: Timeout after 600s without finding target output"
            exit 1
          }
